<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Board // Elite Edition</title>
    <style>
        /* === THE AURA THEME === */
        :root {
            --aura-pink: #ffc2d1;
            --aura-white: #ffffff;
            --aura-glow: rgba(255, 182, 193, 0.5);
            --text-dark: #4a4a4a;
            --soft-border: #ffe5ec;
        }

        body {
            background: linear-gradient(180deg, #ffffff 0%, #fff0f3 100%);
            color: var(--text-dark);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Header */
        header {
            width: 100%;
            padding: 50px 0;
            background: var(--aura-white);
            text-align: center;
            border-bottom: 5px solid var(--aura-pink);
            box-shadow: 0 10px 40px var(--aura-glow);
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 42px;
            color: #ff8fab;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
        }

        /* Modern Post Box */
        .creator-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            border: 2px solid var(--soft-border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.03);
            margin-bottom: 50px;
        }

        .field-label {
            font-weight: 800;
            color: #fb6f92;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f8f9fa;
            border-radius: 12px;
            background: #fdfdfd;
            margin-bottom: 20px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--aura-pink);
            background: white;
            box-shadow: 0 0 15px var(--aura-glow);
        }

        /* Post Button */
        .aura-btn {
            background: linear-gradient(90deg, #ff8fab 0%, #fb6f92 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .aura-btn:hover {
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.4);
            transform: translateY(-3px);
        }

        /* Post Feed */
        .post-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--soft-border);
            animation: slideUp 0.6s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            color: #ffb3c1;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .post-user { color: #fb6f92; font-size: 16px; }

        .post-body {
            font-size: 17px;
            line-height: 1.6;
            color: #555;
        }

        .post-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            border: 3px solid #fff0f3;
        }

        .stat-banner {
            background: #fb6f92;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>AURA DOMINUS</h1>
</header>

<div class="main-container">
    <div id="statBox" class="stat-banner">0 ACTIVE TRANSMISSIONS</div>

    <div class="creator-container">
        <span class="field-label">Codename</span>
        <input type="text" id="nameInp" placeholder="Who is transmitting?">
        
        <span class="field-label">Data Stream</span>
        <textarea id="msgInp" rows="4" placeholder="Type your message..."></textarea>
        
        <span class="field-label">Visual Upload</span>
        <input type="file" id="imgInp" accept="image/*" style="margin-bottom: 20px;">
        
        <button class="aura-btn" onclick="publish()">Publish to Aura</button>
    </div>

    <div id="auraFeed"></div>
</div>

<script>
    const auraFeed = document.getElementById('auraFeed');
    const statBox = document.getElementById('statBox');

    // Database Setup
    let database = JSON.parse(localStorage.getItem('dominus_aura_v3')) || [];

    function updateView() {
        auraFeed.innerHTML = '';
        statBox.innerText = database.length + " ACTIVE TRANSMISSIONS";

        database.slice().reverse().forEach(p => {
            const card = document.createElement('div');
            card.className = 'post-card';
            
            let imgTag = p.img ? `<img src="${p.img}" class="post-image">` : '';

            card.innerHTML = `
                <div class="post-header">
                    <span class="post-user">✨ ${p.user}</span>
                    <span>${p.time}</span>
                </div>
                <div class="post-body">${p.text}</div>
                ${imgTag}
            `;
            auraFeed.appendChild(card);
        });
    }

    async function publish() {
        const name = document.getElementById('nameInp').value || "Aura Guest";
        const text = document.getElementById('msgInp').value;
        const file = document.getElementById('imgInp').files[0];

        if (!text && !file) return alert("System requires data to transmit.");

        let imgData = null;
        if (file) {
            imgData = await new Promise((res) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const entry = {
            user: name,
            text: text,
            img: imgData,
            time: new Date().toLocaleTimeString()
        };

        database.push(entry);
        localStorage.setItem('dominus_aura_v3', JSON.stringify(database));
        
        // Reset and Refresh
        document.getElementById('nameInp').value = '';
        document.getElementById('msgInp').value = '';
        document.getElementById('imgInp').value = '';
        updateView();
    }

    updateView();
</script>

</body>
</html>
