<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/sakura/ - 4sakura</title>
    <style>
        /* === THE 4SAKURA SYSTEM (400+ lines potential) === */
        :root {
            --sakura-pink: #ffdae9;
            --sakura-border: #f8bbd0;
            --sakura-text: #880e4f;
            --sakura-bg: #fff5f8;
            --post-bg: #fce4ec;
        }

        body {
            background-color: var(--sakura-bg);
            color: var(--sakura-text);
            font-family: arial,helvetica,sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 10px;
        }

        /* Top Navigation Bar */
        .nav-bar {
            background: var(--sakura-pink);
            border-bottom: 1px solid var(--sakura-border);
            padding: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-bar a {
            color: var(--sakura-text);
            text-decoration: none;
            font-weight: bold;
            padding: 0 10px;
            cursor: pointer;
        }

        .nav-bar a:hover { text-decoration: underline; }

        header { text-align: center; margin-bottom: 20px; }

        h1 {
            color: #d81b60;
            font-size: 28px;
            margin: 5px;
        }

        /* Post Creation Section */
        #upload-section {
            display: block;
            background: var(--post-bg);
            border: 1px solid var(--sakura-border);
            width: fit-content;
            margin: 0 auto 30px auto;
            padding: 10px;
        }

        .post-form-table td { padding: 2px; }

        input, textarea {
            border: 1px solid var(--sakura-border);
            padding: 2px;
        }

        /* The Board Layout */
        .board { margin-top: 20px; }

        .post {
            display: inline-block;
            background: var(--post-bg);
            border: 1px solid var(--sakura-border);
            margin: 5px;
            padding: 5px;
            vertical-align: top;
            width: 95%; /* Mobile friendly, Desktop clean */
            max-width: 800px;
        }

        .post-header {
            font-size: 11px;
            color: #555;
            margin-bottom: 5px;
            background: var(--sakura-pink);
            padding: 3px;
        }

        .poster-name { color: #117743; font-weight: bold; }

        /* Small Uniform Image System */
        .img-container {
            float: left;
            margin: 5px 20px 5px 5px;
        }

        .post-image {
            width: 150px; /* Small and uniform */
            height: 150px;
            object-fit: cover; /* Keeps them the same size without stretching */
            border: 1px solid var(--sakura-border);
            cursor: pointer;
        }

        .post-content {
            font-size: 14px;
            word-wrap: break-word;
        }

        .search-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav-bar">
        [ <a onclick="showSection('home')">Home</a> / 
        <a onclick="showSection('upload')">Upload</a> / 
        <a onclick="showSection('recent')">Recent</a> / 
        <a onclick="showSection('popular')">Popular</a> ]
    </div>

    <header>
        <h1>4sakura</h1>
        <div id="sub-title">/sakura/ - Dominus Aura Discussion</div>
    </header>

    <div class="search-bar">
        Search for post: <input type="text" id="searchInput" onkeyup="filterPosts()" placeholder="Type keywords...">
    </div>

    <div id="upload-section" class="hidden">
        <table class="post-form-table">
            <tr>
                <td><b>Name</b></td>
                <td><input type="text" id="posterName" placeholder="Anonymous"></td>
            </tr>
            <tr>
                <td><b>Subject</b></td>
                <td><input type="text" id="postSubject" placeholder="Title"></td>
            </tr>
            <tr>
                <td><b>Comment</b></td>
                <td><textarea id="postComment" rows="4" cols="40"></textarea></td>
            </tr>
            <tr>
                <td><b>File</b></td>
                <td><input type="file" id="postFile" accept="image/*"></td>
            </tr>
            <tr>
                <td></td>
                <td><button onclick="submitPost()">Post</button></td>
            </tr>
        </table>
    </div>

    <hr>

    <div id="board" class="board">
        </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('4sakura_data')) || [];

        function showSection(type) {
            const uploadBox = document.getElementById('upload-section');
            const boardTitle = document.getElementById('sub-title');
            
            uploadBox.classList.add('hidden');
            
            if (type === 'upload') {
                uploadBox.classList.remove('hidden');
                boardTitle.innerText = "Upload Data to the Board";
            } else if (type === 'popular') {
                boardTitle.innerText = "Most Popular Uploads (All Time)";
                renderBoard(posts.slice().sort((a,b) => b.views - a.views));
            } else if (type === 'recent') {
                boardTitle.innerText = "Most Recent Posts";
                renderBoard(posts);
            } else {
                boardTitle.innerText = "/sakura/ - Dominus Aura Discussion";
                renderBoard(posts);
            }
        }

        async function submitPost() {
            const name = document.getElementById('posterName').value || "Anonymous";
            const subject = document.getElementById('postSubject').value || "Untitled";
            const comment = document.getElementById('postComment').value;
            const file = document.getElementById('postFile').files[0];

            let imgData = "";
            if (file) {
                imgData = await new Promise(res => {
                    const reader = new FileReader();
                    reader.onload = () => res(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const newPost = {
                name: name,
                subject: subject,
                comment: comment,
                img: imgData,
                date: new Date().toLocaleString(),
                views: Math.floor(Math.random() * 100), // Random popularity for demo
                id: Date.now()
            };

            posts.unshift(newPost); // Add to top
            localStorage.setItem('4sakura_data', JSON.stringify(posts));
            document.getElementById('postComment').value = "";
            document.getElementById('postFile').value = "";
            showSection('home');
        }

        function filterPosts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = posts.filter(p => p.comment.toLowerCase().includes(query) || p.subject.toLowerCase().includes(query));
            renderBoard(filtered);
        }

        function renderBoard(dataArray) {
            const board = document.getElementById('board');
            board.innerHTML = '';

            dataArray.forEach(p => {
                const imgHTML = p.img ? `<div class="img-container"><img class="post-image" src="${p.img}"></div>` : '';
                
                const postHTML = `
                    <div class="post">
                        <div class="post-header">
                            <b>${p.subject}</b> 
                            <span class="poster-name">${p.name}</span> 
                            ${p.date} No.${p.id}
                        </div>
                        ${imgHTML}
                        <div class="post-content">${p.comment}</div>
                    </div>
                    <br clear="left">
                `;
                board.innerHTML += postHTML;
            });
        }

        // Initialize
        renderBoard(posts);
    </script>
</body>
</html>
