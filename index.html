<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominus Aura // Community Board</title>
    <style>
        /* === THE AURA DESIGN (CSS) === */
        :root {
            --primary-pink: #ffafcc;
            --soft-pink: #fde2e4;
            --accent-glow: #ffc8dd;
            --text-main: #5c5c5c;
            --white: #ffffff;
        }

        body {
            background-color: #fff5f6;
            background-image: linear-gradient(135deg, #fff5f6 0%, #fde2e4 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Header / Logo Area */
        header {
            background: var(--white);
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid var(--primary-pink);
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.3);
        }

        h1 {
            margin: 0;
            color: #ff85a1;
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--soft-pink);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Posting Box */
        .post-box {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border: 1px solid var(--soft-pink);
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ff85a1;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--soft-pink);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-pink);
            background: #fff;
        }

        /* Custom File Upload */
        .file-upload {
            background: var(--soft-pink);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            cursor: pointer;
            color: #ff85a1;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: block;
            width: 100%;
        }

        button:hover {
            background: #ff85a1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.4);
        }

        /* Stats bar */
        .stats {
            text-align: center;
            font-weight: bold;
            color: #ff85a1;
            margin-bottom: 20px;
        }

        /* THE FEED */
        .feed { display: grid; gap: 20px; }

        .post {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--soft-pink);
            transition: 0.3s;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-meta {
            font-size: 12px;
            color: #bbb;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .post-user { color: #ff85a1; font-weight: bold; font-size: 14px; }

        .post-body { font-size: 15px; line-height: 1.6; }

        .uploaded-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            display: block;
            border: 2px solid var(--soft-pink);
        }

        /* Scrollbar fix */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--white); }
        ::-webkit-scrollbar-thumb { background: var(--primary-pink); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <h1>✨ Dominus Aura Board ✨</h1>
</header>

<div class="container">
    <div class="stats" id="activeCounter">0 TRANSMISSIONS LOGGED</div>

    <div class="post-box">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="userInput" placeholder="Enter your display name...">
        </div>
        <div class="input-group">
            <label>Message</label>
            <textarea id="msgInput" rows="3" placeholder="Share your thoughts..."></textarea>
        </div>
        <div class="input-group">
            <label>Image Attachment</label>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        <button onclick="createPost()">POST TO AURA</button>
    </div>

    <div id="feed" class="feed">
        </div>
</div>

<script>
    /* === AURA ENGINE (JS) === */
    const feed = document.getElementById('feed');
    const counter = document.getElementById('activeCounter');
    
    // Load existing posts
    let auraPosts = JSON.parse(localStorage.getItem('aura_board_v2')) || [];

    function savePosts() {
        localStorage.setItem('aura_board_v2', JSON.stringify(auraPosts));
    }

    function renderFeed() {
        feed.innerHTML = '';
        counter.innerText = auraPosts.length + " TRANSMISSIONS LOGGED";

        auraPosts.slice().reverse().forEach(post => {
            const postCard = document.createElement('div');
            postCard.className = 'post';
            
            let imgHTML = post.image ? `<img src="${post.image}" class="uploaded-img">` : '';

            postCard.innerHTML = `
                <div class="post-meta">
                    <span class="post-user">${post.user}</span>
                    <span>${post.date}</span>
                </div>
                <div class="post-body">
                    ${post.text}
                </div>
                ${imgHTML}
            `;
            feed.appendChild(postCard);
        });
    }

    async function createPost() {
        const user = document.getElementById('userInput').value || "Anonymous Guest";
        const text = document.getElementById('msgInput').value;
        const file = document.getElementById('fileInput').files[0];

        if (!text && !file) {
            alert("Please add some text or an image!");
            return;
        }

        let base64Image = null;
        if (file) {
            base64Image = await convertToBase64(file);
        }

        const newPost = {
            user: user,
            text: text,
            image: base64Image,
            date: new Date().toLocaleString()
        };

        auraPosts.push(newPost);
        savePosts();
        renderFeed();

        // Clear Inputs
        document.getElementById('userInput').value = '';
        document.getElementById('msgInput').value = '';
        document.getElementById('fileInput').value = '';
    }

    function convertToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // Initialize
    renderFeed();
</script>

</body>
</html>
