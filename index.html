<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/sakura/ - 4sakura Classic</title>
    <style>
        /* === VINTAGE WEB 1.0 AURA STYLING === */
        :root {
            --bg-color: #FFFFEE; /* Classic old-web cream */
            --header-red: #AF0A16;
            --post-bg: #F0E0D6;
            --name-color: #117743;
            --link-color: #0000EE;
        }

        body {
            background-color: var(--bg-color);
            color: #800000;
            font-family: "Times New Roman", Times, serif;
            margin: 0;
            padding: 10px;
        }

        /* Top Banner Navigation */
        .admin-nav {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
            border-bottom: 1px solid #CCC;
            padding-bottom: 10px;
        }

        .admin-nav a {
            color: var(--link-color);
            text-decoration: none;
            font-weight: bold;
            padding: 0 5px;
        }

        .admin-nav a:hover { text-decoration: underline; color: red; }

        header { text-align: center; margin-bottom: 20px; }
        
        header h1 {
            font-size: 36px;
            color: var(--header-red);
            margin: 0;
            text-decoration: underline;
        }

        .board-desc { font-style: italic; font-weight: bold; }

        /* Classic 4chan Upload Table */
        .post-form-area {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .post-table {
            background-color: var(--post-bg);
            border: 1px solid #777;
            padding: 5px;
            font-size: 13px;
        }

        .post-table td { padding: 2px; }
        
        .label-cell {
            background-color: #EEAA88;
            font-weight: bold;
            padding-right: 10px;
            border: 1px solid #777;
        }

        input, textarea { border: 1px solid #999; }

        /* The Posts */
        .thread { margin-top: 20px; border-top: 1px solid #777; padding-top: 10px; }

        .post {
            display: table;
            background-color: var(--post-bg);
            border: 1px solid #777;
            margin: 4px;
            padding: 5px;
            max-width: 90%;
        }

        .post-header { font-size: 12px; margin-bottom: 8px; }
        .subject { color: #0F0C5D; font-weight: bold; }
        .name { color: var(--name-color); font-weight: bold; }

        /* Vintage Thumbnails */
        .file-info { font-size: 11px; margin-bottom: 5px; }
        .thumbnail-box { float: left; margin: 0 20px 5px 0; }
        .thumbnail {
            width: 150px;
            height: 150px;
            object-fit: contain; /* Classic non-cropped look */
            border: 2px solid #777;
            background: #FFF;
        }

        .comment { font-size: 14px; margin-left: 5px; line-height: 1.3; }

        .hidden { display: none; }
        
        /* Interactive Section Banner */
        #section-indicator {
            text-align: center;
            background: var(--header-red);
            color: white;
            font-weight: bold;
            padding: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="admin-nav">
        [ <a href="javascript:void(0)" onclick="loadPosts('home')">Home</a> / 
        <a href="javascript:void(0)" onclick="toggleUpload()">Post</a> / 
        <a href="javascript:void(0)" onclick="loadPosts('popular')">Popular</a> / 
        <a href="javascript:void(0)" onclick="loadPosts('recent')">Recent</a> ]
    </div>

    <header>
        <h1>4sakura</h1>
        <div class="board-desc">/sakura/ - The Aura Dominus Archive</div>
    </header>

    <div id="section-indicator">MODE: HOME (ALL TRANSMISSIONS)</div>

    <div id="upload-box" class="post-form-area hidden">
        <table class="post-table">
            <tr>
                <td class="label-cell">Name</td>
                <td><input type="text" id="pName" placeholder="Anonymous"></td>
            </tr>
            <tr>
                <td class="label-cell">Subject</td>
                <td><input type="text" id="pSubj" placeholder="Title"></td>
            </tr>
            <tr>
                <td class="label-cell">Comment</td>
                <td><textarea id="pComm" rows="4" cols="35"></textarea></td>
            </tr>
            <tr>
                <td class="label-cell">File</td>
                <td><input type="file" id="pFile" accept="image/*"></td>
            </tr>
            <tr>
                <td></td>
                <td><button onclick="postData()">Submit</button></td>
            </tr>
        </table>
    </div>

    <div id="board" class="thread">
        </div>

    <script>
        /* === 4SAKURA VINTAGE ENGINE === */
        let archive = JSON.parse(localStorage.getItem('4sakura_classic_v1')) || [];

        function toggleUpload() {
            document.getElementById('upload-box').classList.toggle('hidden');
        }

        function setIndicator(text) {
            document.getElementById('section-indicator').innerText = "MODE: " + text.toUpperCase();
        }

        async function postData() {
            const name = document.getElementById('pName').value || "Anonymous";
            const subj = document.getElementById('pSubj').value || "Untitled";
            const comm = document.getElementById('pComm').value;
            const file = document.getElementById('pFile').files[0];

            if(!comm && !file) return alert("System requires input.");

            let b64 = "";
            if (file) {
                b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const newEntry = {
                id: Math.floor(Math.random() * 9999999),
                name: name,
                subj: subj,
                comm: comm,
                img: b64,
                time: new Date().toLocaleString(),
                clicks: Math.floor(Math.random() * 50)
            };

            archive.unshift(newEntry);
            localStorage.setItem('4sakura_classic_v1', JSON.stringify(archive));
            
            // UI Reset
            document.getElementById('pComm').value = '';
            document.getElementById('pFile').value = '';
            toggleUpload();
            loadPosts('home');
        }

        function loadPosts(mode) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            setIndicator(mode);

            let dataToRender = [...archive];

            if (mode === 'popular') {
                dataToRender.sort((a, b) => b.clicks - a.clicks);
            } else if (mode === 'recent') {
                // Already sorted by unshift
            }

            dataToRender.forEach(p => {
                const imgHTML = p.img ? `
                    <div class="thumbnail-box">
                        <div class="file-info">File: sakura_capture_${p.id}.png</div>
                        <img src="${p.img}" class="thumbnail">
                    </div>` : '';
                
                board.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <span class="subject">${p.subj}</span> 
                            File: <span class="name">${p.name}</span> 
                            ${p.time} No.${p.id}
                        </div>
                        ${imgHTML}
                        <div class="comment">${p.comm}</div>
                    </div>
                    <br clear="left">
                `;
            });
        }

        // Initial Boot
        loadPosts('home');
    </script>
</body>
</html>
