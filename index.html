<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/sakura/ - 4sakura Board</title>
    <style>
        /* === 4SAKURA ULTIMATE STYLING === */
        :root {
            --sakura-pink-light: #fff0f6;
            --sakura-pink-mid: #ffdeeb;
            --sakura-pink-dark: #f06292;
            --sakura-text: #4a001f;
            --sakura-accent: #d81b60;
            --aura-glow: 0 0 15px rgba(255, 182, 193, 0.6);
        }

        /* Aura Background Animation */
        body {
            background-color: var(--sakura-pink-light);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.8) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255, 192, 203, 0.4) 0%, transparent 30%);
            color: var(--sakura-text);
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            margin: 0;
            padding: 15px;
            line-height: 1.4;
        }

        /* Top Navigation */
        .top-nav {
            background: var(--sakura-pink-mid);
            border: 1px solid var(--sakura-pink-dark);
            padding: 8px;
            font-size: 12px;
            text-align: center;
            box-shadow: var(--aura-glow);
            margin-bottom: 20px;
        }

        .top-nav a {
            text-decoration: none;
            color: var(--sakura-accent);
            font-weight: bold;
            margin: 0 15px;
            transition: 0.2s;
        }

        .top-nav a:hover { color: #fff; background: var(--sakura-accent); padding: 5px; border-radius: 4px; }

        header { text-align: center; margin: 40px 0; }
        
        header h1 {
            font-size: 48px;
            color: var(--sakura-accent);
            text-shadow: 3px 3px 0px #fff;
            margin: 0;
        }

        /* Search & Catalog Controls */
        .controls {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--sakura-pink-mid);
            max-width: 600px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        /* Post Creation Interface */
        .post-uploader {
            display: none; /* Toggled by JS */
            background: #fff;
            border: 2px solid var(--sakura-accent);
            padding: 20px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 10px 10px 0px var(--sakura-pink-mid);
        }

        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid var(--sakura-pink-dark);
            box-sizing: border-box;
        }

        .submit-btn {
            background: var(--sakura-accent);
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* The Board Layout */
        .post-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .thread-post {
            background: #fdf2f7;
            border: 1px solid var(--sakura-pink-dark);
            padding: 10px;
            width: 100%;
            max-width: 700px;
            min-height: 160px;
            box-shadow: 3px 3px 0px var(--sakura-pink-mid);
        }

        .post-info {
            background: var(--sakura-pink-mid);
            padding: 5px;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .subject { color: #cc1105; font-weight: bold; font-size: 14px; }
        .name { color: #117743; font-weight: bold; }

        /* Thumbnails */
        .thumb-box {
            float: left;
            margin-right: 20px;
        }

        .thumbnail {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 1px solid var(--sakura-pink-dark);
            background: #fff;
        }

        .post-text { font-size: 14px; color: #333; }

        /* Footer Stats */
        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 12px;
            color: var(--sakura-pink-dark);
        }

        .glow-dot {
            height: 10px;
            width: 10px;
            background-color: #ff0080;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #ff0080;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        [ <a href="#" onclick="changeView('recent')">Recent</a> / 
        <a href="#" onclick="changeView('popular')">Most Popular</a> / 
        <a href="#" onclick="toggleUpload()">Upload New Post</a> ]
    </div>

    <header>
        <h1>4sakura</h1>
        <span>Dominus Aura Board - Ver. 3.9GHz</span>
    </header>

    <div class="controls">
        <b>Search Terminal:</b> 
        <input type="text" id="searchBar" onkeyup="searchEngine()" placeholder="Filter the sakura stream..." style="width: 60%; margin: 0;">
    </div>

    <div id="postUploader" class="post-uploader">
        <h3 style="margin-top:0; color:var(--sakura-accent)">CREATE NEW DATA STREAM</h3>
        <input type="text" id="formSubject" placeholder="Post Title (Subject)">
        <input type="text" id="formName" placeholder="Your Name (Optional)">
        <textarea id="formComment" rows="5" placeholder="Your Message..."></textarea>
        <input type="file" id="formFile" accept="image/*">
        <button class="submit-btn" onclick="executePost()">TRANSMIT TO BOARD</button>
    </div>

    <div id="boardFeed" class="post-container">
        </div>

    <footer>
        <span class="glow-dot"></span> 4SAKURA SYSTEM ONLINE - REFRESH TO SYNC DATA
    </footer>

    <script>
        /* === 4SAKURA CORE ENGINE === */
        let sakuraData = JSON.parse(localStorage.getItem('4sakura_master_v3')) || [];

        function toggleUpload() {
            const box = document.getElementById('postUploader');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        async function executePost() {
            const subject = document.getElementById('formSubject').value || "Untitled";
            const name = document.getElementById('formName').value || "Anonymous";
            const comment = document.getElementById('formComment').value;
            const file = document.getElementById('formFile').files[0];

            if (!comment && !file) return alert("Error: Post must contain text or image.");

            let b64 = "";
            if (file) {
                b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            const postObj = {
                id: Math.floor(Math.random() * 900000) + 100000,
                subject: subject,
                name: name,
                comment: comment,
                img: b64,
                time: new Date().toLocaleString(),
                popularity: 0
            };

            sakuraData.unshift(postObj);
            localStorage.setItem('4sakura_master_v3', JSON.stringify(sakuraData));
            
            // Reset Form
            document.getElementById('formSubject').value = '';
            document.getElementById('formComment').value = '';
            document.getElementById('formFile').value = '';
            toggleUpload();
            renderBoard(sakuraData);
        }

        function searchEngine() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = sakuraData.filter(p => 
                p.comment.toLowerCase().includes(q) || 
                p.subject.toLowerCase().includes(q)
            );
            renderBoard(filtered);
        }

        function changeView(type) {
            if (type === 'popular') {
                const sorted = [...sakuraData].sort((a,b) => b.id - a.id); // Fake popularity logic
                renderBoard(sorted);
            } else {
                renderBoard(sakuraData);
            }
        }

        function renderBoard(arr) {
            const container = document.getElementById('boardFeed');
            container.innerHTML = '';

            arr.forEach(p => {
                const imgPart = p.img ? `<div class="thumb-box"><img src="${p.img}" class="thumbnail"></div>` : '';
                
                container.innerHTML += `
                    <div class="thread-post">
                        <div class="post-info">
                            <span class="subject">${p.subject}</span> 
                            By <span class="name">${p.name}</span> 
                            at ${p.time} No.${p.id}
                        </div>
                        ${imgPart}
                        <div class="post-text">${p.comment}</div>
                    </div>
                `;
            });
        }

        // Run on load
        renderBoard(sakuraData);
    </script>
</body>
</html>
